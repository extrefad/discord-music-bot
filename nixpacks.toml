# nixpacks.toml - força Node 16 + dependências para Vosk funcionar

[phases.setup]
  nixPkgs = [
    "nodejs-16_x",
    "python3",
    "python3Packages.pip",
    "gcc",
    "gnumake",
    "unzip",
    "yt-dlp"
  ]
  aptPkgs = ["python3-dev", "libopus-dev"]

[phases.install]
  cmds = ["npm install --python=python3 --legacy-peer-deps"]

[start]
  cmd = "node src/index.js"